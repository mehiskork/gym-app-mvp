spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/gymapp}
    username: ${SPRING_DATASOURCE_USERNAME:gymapp}
    password: ${SPRING_DATASOURCE_PASSWORD:gymapp}
  flyway:
    enabled: true
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI:}
          jwk-set-uri: ${SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI:}

server:
  port: ${PORT:8080}

claim:
  codeTtlMinutes: 10
  devUserHeaderEnabled: false

sync:
  maxOpsPerRequest: ${SYNC_MAX_OPS_PER_REQUEST:250}

logging:
  level:
    org.springframework.web.filter.CommonsRequestLoggingFilter: INFO

rateLimit:
  sync:
    capacity: 30
    refillPerSecond: 10
    maxBuckets: 20000
    cleanupBatchSize: 200
    staleAfterSeconds: 1800
  register:
    capacity: 20
    refillPerSecond: 5
  claimConfirm:
    capacity: 5
    refillPerSecond: 0.1
---
spring:
  config:
    activate:
      on-profile: dev

claim:
  devUserHeaderEnabled: true
---
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}

claim:
  devUserHeaderEnabled: false
---
spring:
  config:
    activate:
      on-profile: test

claim:
  devUserHeaderEnabled: true