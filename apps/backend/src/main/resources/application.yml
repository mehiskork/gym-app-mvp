spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/gymapp}
    username: ${SPRING_DATASOURCE_USERNAME:gymapp}
    password: ${SPRING_DATASOURCE_PASSWORD:gymapp}
  flyway:
    enabled: true

server:
  port: ${PORT:8080}

logging:
  level:
    org.springframework.web.filter.CommonsRequestLoggingFilter: INFO

rateLimit:
  sync:
    capacity: 30
    refillPerSecond: 10
  register:
    capacity: 20
    refillPerSecond: 5
  claimConfirm:
    capacity: 5
    refillPerSecond: 0.1